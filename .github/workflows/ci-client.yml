name: Next.js CI/CD

on:
  push:
    branches:
      - development
      - test
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🔥 Set ENV based on branch
      - name: Set Environment
        id: env
        run: |
          if [[ "${GITHUB_REF_NAME}" == "development" ]]; then
            echo "ENV=development" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "test" ]]; then
            echo "ENV=test" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
          fi

      # 🔥 Inject ENV file
      - name: Create .env
        run: |
          if [[ "${{ steps.env.outputs.ENV }}" == "development" ]]; then
            echo "${{ secrets.ENV_DEV }}" > .env
          elif [[ "${{ steps.env.outputs.ENV }}" == "test" ]]; then
            echo "${{ secrets.ENV_TEST }}" > .env
          elif [[ "${{ steps.env.outputs.ENV }}" == "production" ]]; then
            echo "${{ secrets.ENV_PROD }}" > .env
          fi

      # 🔥 Login GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🔥 Set up Docker Buildx (untuk cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build docker image
      - name: Build Docker Image
        run: |
          if [[ "${{ steps.env.outputs.ENV }}" == "development" ]]; then
            API_URL=${{ secrets.NEXT_PUBLIC_API_URL_DEV }}
            GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID_DEV }}
          elif [[ "${{ steps.env.outputs.ENV }}" == "test" ]]; then
            API_URL=${{ secrets.NEXT_PUBLIC_API_URL_TEST }}
            GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID_TEST }}
          else
            API_URL=${{ secrets.NEXT_PUBLIC_API_URL_PROD }}
            GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID_PROD }}
          fi

          docker build \
            --build-arg NEXT_PUBLIC_API_URL=$API_URL \
            --build-arg API_URL=$API_URL \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID \
            -t ghcr.io/${{ github.repository }}:${{ steps.env.outputs.ENV }} \
            -t ghcr.io/${{ github.repository }}:${{ github.sha }} .

      # 🔥 Push
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ steps.env.outputs.ENV }}
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
